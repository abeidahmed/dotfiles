general.import = ["~/.config/themes/current/alacritty.toml"]

[window]
dimensions = { columns = 100, lines = 40 }
padding = { x = 0, y = 0 }
dynamic_padding = false
decorations = "None"
opacity = 1.0
startup_mode = "Maximized"

[scrolling]
history = 0
multiplier = 3

[font]
size = 10.0 # home size
# size = 12 # Abu Dhabi size

[font.normal]
# family = "JetBrainsMono Nerd Font"
# family = "CaskaydiaCove Nerd Font"
# family = "InputMono Nerd Font"
family = "SFMono Nerd Font"
style = "Medium"

[font.bold]
# family = "JetBrainsMono Nerd Font"
# family = "CaskaydiaCove Nerd Font"
# family = "InputMono Nerd Font"
family = "SFMono Nerd Font"
style = "Medium"

[font.offset]
x = 0
y = 0

[mouse]
hide_when_typing = true

